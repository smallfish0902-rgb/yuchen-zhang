<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張宇宸的個人網頁</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 全域設定 */
        body {
            margin: 0;
            padding: 0;
            /* 背景圖已更改為 wolf.jpg */
            background-image: url('wolf.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 中間白色卡片主體 */
        .main-content {
            background-color: white;
            width: 90%;
            max-width: 850px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            overflow: hidden;
            border-radius: 8px; /* 增加一點圓角感 */
        }

        /* 上半部藍紫色區塊 */
        .top-section {
            background-color: #6a76d4; 
            padding: 50px 20px;
            color: white;
        }

        .top-section img {
            width: 160px;
            height: 160px;
            border-radius: 50%; 
            border: 6px solid rgba(255,255,255,0.2);
            object-fit: cover;
            margin-bottom: 20px;
            background-color: #eee;
        }

        .name { font-size: 28px; font-weight: bold; margin: 10px 0; letter-spacing: 2px; }
        .email, .mobile { font-size: 15px; margin: 5px 0; opacity: 0.9; }

        /* 中間社群列 */
        .middle-section {
            background-color: #4a54a4; 
            padding: 12px;
        }

        .social a { 
            color: white; 
            font-size: 24px; 
            text-decoration: none;
            transition: 0.3s;
        }
        
        .social a:hover { opacity: 0.7; }

        /* 下半部文字內容區塊 */
        .bottom-section {
            display: flex;
            padding: 40px 30px;
            justify-content: space-around;
            align-items: flex-start;
            color: #333;
            background-color: #fff;
        }

        .bottom-section > div { 
            flex: 1; 
            padding: 0 25px; 
            text-align: center;
        }

        .bottom-section strong {
            display: block;
            font-size: 18px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .bottom-section span { 
            display: block; 
            color: #666; 
            line-height: 1.6;
            font-size: 15px; 
        }

        /* 中間的分隔線 */
        .border {
            width: 1px;
            height: 80px;
            background-color: #eee;
            flex: 0 !important;
            padding: 0 !important;
        }

        /* 手機版適應 */
        @media (max-width: 600px) {
            .bottom-section { flex-direction: column; align-items: center; }
            .border { width: 80%; height: 1px; margin: 20px 0; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="top-section">
            <img src="elon.jpg" alt="個人頭像">
            <div class="name">張宇宸</div>
            <div class="email">smallfish0902@gmail.com</div>
            <div class="mobile">+0968259990</div>
        </div>

        <div class="middle-section">
            <div class="social">
                <a href="https://www.facebook.com/profile.php?id=100025976374728" target="_blank">
                    <i class="fab fa-facebook"></i>
                </a>
            </div>
        </div>

        <div class="bottom-section">
            <div>
                <strong>企業管理系</strong>
                <span>我是一名企業管理系學生，個性外向，對行銷與商業策略有興趣，未來希望進入高薪產業發展。</span>
            </div>
            
            <div class="border"></div>
            
            <div>
                <strong>華碩</strong>
                <span>軟體測試實習生</span>
            </div>
        </div>
    </div>
