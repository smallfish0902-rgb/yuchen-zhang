<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張宇宸 | 個人數位名片</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            /* 背景設定：將檔名改為 bg.png */
            background-color: #2c3e50; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 卡片主體 */
        .main-content {
            background-color: white;
            width: 95%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border-radius: 15px;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 上方資訊區 */
        .top-section {
            background: linear-gradient(135deg, #6a76d4, #4a54a4); 
            padding: 50px 20px;
            color: white;
        }

        .top-section img {
            width: 130px;
            height: 130px;
            border-radius: 50%; 
            border: 4px solid rgba(255,255,255,0.5);
            object-fit: cover;
            margin-bottom: 15px;
        }

        .name { font-size: 30px; font-weight: bold; margin: 10px 0; letter-spacing: 2px; }
        .contact-info { font-size: 14px; margin: 5px 0; opacity: 0.9; }

        /* 中間社群列 */
        .middle-section {
            background-color: #3d468f; 
            padding: 12px;
        }

        .social a { 
            color: white; 
            font-size: 22px; 
            margin: 0 20px;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .social a:hover { color: #ffda79; transform: translateY(-3px); display: inline-block; }

        /* 下方文字介紹 */
        .bottom-section {
            display: flex;
            padding: 40px;
            background-color: #fff;
            color: #333;
            text-align: left;
        }

        .section-box { flex: 1; padding: 0 20px; }

        .section-box strong {
            display: block;
