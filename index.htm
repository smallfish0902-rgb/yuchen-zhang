<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張宇宸 | 個人數位名片</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 全域樣式設定 */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            /* 背景圖設定 */
            background-image: url('下載.jpg'); 
            
            /* 調整背景圖大小的關鍵：
               1. 300px: 手動指定寬度，你可以改成 200px (更小) 或 500px (更大)
               2. repeat: 讓圖片重複排列鋪滿螢幕
            */
            background-size: 300px; 
            background-repeat: repeat; 
            
            background-position: top left;
            background-attachment: fixed;
            background-color: #f4f4f4; /* 圖片未載入前的淺灰色背景 */
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 中央白色卡片主體 */
        .main-content {
            background-color: white;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            text-align: center;
            overflow: hidden;
            border-radius: 16px;
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 上半部漸層區塊 */
        .top-section {
            background: linear-gradient(135deg, #6a76d4, #4a54a4); 
            padding: 50px 20px;
            color: white;
        }

        .top-section img {
            width: 140px;
            height: 140px;
            border-radius: 50%; 
            border: 4px solid rgba(255,255,255,0.3);
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .name { font-size: 30px; font-weight: bold; margin: 10px 0; letter-spacing: 3px; }
        .contact-info { font-size: 14px; margin: 6px 0; opacity: 0.9; }
        .contact-info i { margin-right: 8px; width: 16px; }

        /* 中間深色社群列 */
        .middle-section {
            background-color: #3d468f; 
            padding: 12px;
        }

        .social a { 
            color: white; 
            font-size: 24px; 
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            margin: 0 20px;
        }
        
        .social a:hover { 
            transform: translateY(-3px);
            color: #ffda79;
        }

        /* 下半部介紹區塊 */
        .bottom-section {
            display: flex;
            padding: 40px;
            justify-content: space-around;
            color: #333;
            background-color: #fff;
        }

        .bottom-section > div { 
            flex: 1; 
            padding: 0 20px; 
        }

        .bottom-section strong {
            display: inline-block;
            font-size: 18px;
            margin-bottom: 15px;
            color: #2c3e50;
            border-bottom: 3px solid #6a76d4;
            padding-bottom: 5px;
        }

        .bottom-section span { 
            display: block; 
            color: #555; 
            line-height: 1.8;
            font-size: 14px; 
            text-align: justify;
        }

            font-size: 18
