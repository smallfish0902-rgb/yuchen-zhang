<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張宇宸 | 個人數位名片</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            /* 1. 這裡確保檔名與 GitHub 上的 bg.png 完全一致 */
            background-image: url('bg.png'); 
            
            /* 2. 背景縮小並重複排列 */
            background-size: 180px; 
            background-repeat: repeat; 
            
            background-position: center;
            background-attachment: fixed;
            background-color: #2c3e50; 
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-content {
            background-color: white;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            text-align: center;
            border-radius: 16px;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-section {
            background: linear-gradient(135deg, #6a76d4, #4a54a4); 
            padding: 50px 20px;
            color: white;
        }

        .top-section img {
            width: 140px;
            height: 140px;
            border-radius: 50%; 
            border: 4px solid rgba(255,255,255,0.3);
            object-fit: cover;
            margin-bottom: 15px;
        }

        .name { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .contact-info { font-size: 14px; margin: 5px 0; opacity: 0.9; }

        .middle-section {
            background-color: #3d468f; 
            padding: 15px;
        }

        .social a { 
            color: white; 
            font-size: 24px; 
            text-decoration: none;
            margin: 0 20px;
            transition: 0.3s;
        }
        
        .social a:hover { color: #ffda79; }

        .bottom-section {
            display: flex;
            padding: 40px;
            background-color: #fff;
            text-align: left;
        }

        .section-box { flex: 1; padding: 0 20px; }

        .section-box strong {
            display: block;
            font-size: 18px;
            margin-bottom: 10px;
            color: #2c3e50;
            border-left: 4px solid #6a76d4;
            padding-left: 10px;
        }

        .section-box span { color: #555; line-height: 1.7; font-size: 14.5px; }

        @media (max-width: 650px) {
            .bottom-section { flex-direction: column; }
            .section-box { margin-bottom: 25px; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="top-section">
            <!-- 這裡會讀取你 GitHub 上的 elon.jpg -->
            <img src="elon.jpg" alt="張宇宸">
            <div class="name">張宇宸</div>
            <div class="contact-info"><i class="fas fa-envelope"></i> smallfish0902@gmail.com</div>
            <div class="contact-info"><i class="fas fa-mobile-alt"></i> +886 968 259 990</div>
        </div>

        <div class="middle-section">
            <div class="social">
                <a href="https://www.facebook.com/profile.php?id=100025976374728" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/yuchen09_18/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/" target="_blank"><i class="fab fa-github"></i></a>
            </div>
        </div>

        <div class="bottom-section">
            <div class="section-box">
                <strong>關於我</strong>
                <span>
                    我是宇宸！擁有資處科技術背景與企管系邏輯，平時熱衷股票實戰投資。具備服務業溫度與快速上手的適應力。
                </span>
            </div>
            
            <div class="section-box">
                <strong>應徵目標</strong>
                <span style="font-weight:bold; color:#4a54a4; display:block;">台新銀行</span>
                <span>期待在台新銀行發揮跨領域實力。</span>
            </div>
        </div>
    </div>

</body>
</html>
