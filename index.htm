<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張宇宸 | 個人數位名片</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            /* 背景設定：將檔名改為 bg.png */
            background-color: #2c3e50; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 卡片主體 */
        .main-content {
            background-color: white;
            width: 95%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border-radius: 15px;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 上方資訊區 */
        .top-section {
            background: linear-gradient(135deg, #6a76d4, #4a54a4); 
            padding: 50px 20px;
            color: white;
        }

        .top-section img {
            width: 130px;
            height: 130px;
            border-radius: 50%; 
            border: 4px solid rgba(255,255,255,0.5);
            object-fit: cover;
            margin-bottom: 15px;
        }

        .name { font-size: 30px; font-weight: bold; margin: 10px 0; letter-spacing: 2px; }
        .contact-info { font-size: 14px; margin: 5px 0; opacity: 0.9; }

        /* 中間社群列 */
        .middle-section {
            background-color: #3d468f; 
            padding: 12px;
        }

        .social a { 
            color: white; 
            font-size: 22px; 
            margin: 0 20px;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .social a:hover { color: #ffda79; transform: translateY(-3px); display: inline-block; }

        /* 下方文字介紹 */
        .bottom-section {
            display: flex;
            padding: 40px;
            background-color: #fff;
            color: #333;
            text-align: left;
        }

        .section-box { flex: 1; padding: 0 20px; }

        .section-box strong {
            display: block;
            font-size: 18px;
            margin-bottom: 10px;
            color: #2c3e50;
            border-left: 4px solid #6a76d4;
            padding-left: 10px;
        }

        .section-box span { 
            display: block; 
            color: #555; 
            line-height: 1.8;
            font-size: 14.5px; 
            text-align: justify;
        }

        .target-title {
            font-size: 18px;
            font-weight: bold;
            color: #4a54a4;
            margin-bottom: 8px;
            display: block;
        }

        /* RWD 手機版調整 */
        @media (max-width: 650px) {
            .bottom-section { flex-direction: column; padding: 30px; }
            .section-box { margin-bottom: 30px; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="top-section">
            <img src="elon.jpg" alt="張宇宸">
            <div class="name">張宇宸</div>
            <div class="contact-info"><i class="fas fa-envelope"></i> smallfish0902@gmail.com</div>
            <div class="contact-info"><i class="fas fa-mobile-alt"></i> +886 968 259 990</div>
        </div>

        <div class="middle-section">
            <div class="social">
                <a href="https://www.facebook.com/profile.php?id=100025976374728" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/yuchen09_18/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/" target="_blank"><i class="fab fa-github"></i></a>
            </div>
        </div>

        <div class="bottom-section">
            <div class="section-box">
                <strong>關於我</strong>
                <span>
                    您好，我是宇宸！我是一個「愛挑戰」的人。雖然目前讀企管，但我高中是資處科背景，電腦操作對我來說非常簡單。
                    平時我最喜歡研究股票投資，比起只讀課本，我更喜歡將資金投入市場實戰，對金融市場有敏銳的觀察力與執行力。
                </span>
            </div>
            
            <div class="section-box">
                <strong>應徵目標</strong>
                <span class="target-title">台新銀行</span>
                <span>具備資處硬實力與企管軟實力，擁有服務業的溫度與極佳的數位適應力，是能快速上手的跨領域行動派，期待在台新貢獻所長。</span>
            </div>
        </div>
    </div>

</body>
</html>
